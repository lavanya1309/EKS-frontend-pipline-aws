name: Test, Build and Push to ECR

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: frontend-data-validation-tracker

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.VERSION_TAG }}
      ecr_registry: ${{ steps.ecr-login.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if missing
        run: |
          aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }} 2>/dev/null || true

      - name: Bump version from commits (Conventional Commits)
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="1.0.0"
            echo "VERSION_TAG=v${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "Version: v${NEW_VERSION} (initial release)"
            exit 0
          fi
          BASE_VERSION=${LATEST_TAG#v}
          COMMITS=$(git log ${LATEST_TAG}..HEAD --oneline 2>/dev/null || echo "")
          BUMP="patch"
          echo "$COMMITS" | grep -qE "^(feat|fix)(\(.+\))?!|BREAKING CHANGE" && BUMP="major"
          [ "$BUMP" = "patch" ] && echo "$COMMITS" | grep -qE "^feat" && BUMP="minor"
          [ "$BUMP" = "patch" ] && echo "$COMMITS" | grep -qE "^fix" && BUMP="patch"
          IFS='.' read -r MAJ MIN PAT <<< "$BASE_VERSION"
          MAJ=${MAJ:-1}; MIN=${MIN:-0}; PAT=${PAT:-0}
          case $BUMP in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          NEW_VERSION="${MAJ}.${MIN}.${PAT}"
          echo "VERSION_TAG=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Version: v${NEW_VERSION} (bump: $BUMP, base: $BASE_VERSION)"

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          VERSION_TAG: ${{ steps.version.outputs.VERSION_TAG }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

  deploy:
    needs: [build-push]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        env:
          IMAGE: ${{ needs.build-push.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-push.outputs.version_tag }}
          ACM_CERT_ARN: ${{ vars.ACM_CERT_ARN }}
          INGRESS_HOST: ${{ vars.INGRESS_HOST }}
        run: |
          sed -i "s|PLACEHOLDER_ECR_IMAGE|${IMAGE}|g" k8s/deployment.yaml
          if [ -n "$ACM_CERT_ARN" ] && [ -n "$INGRESS_HOST" ]; then
            sed -i "s|REPLACE_WITH_ACM_CERT_ARN|${ACM_CERT_ARN}|g" k8s/ingress.yaml
            sed -i "s|REPLACE_WITH_YOUR_DOMAIN|${INGRESS_HOST}|g" k8s/ingress.yaml
            APPLY_INGRESS=1
          else
            APPLY_INGRESS=0
          fi
          kubectl apply -f k8s/namespace.yaml --validate=false
          kubectl apply -f k8s/deployment.yaml --validate=false
          kubectl apply -f k8s/service.yaml --validate=false
          kubectl apply -f k8s/hpa.yaml --validate=false
          kubectl apply -f k8s/pdb.yaml --validate=false
          if [ "$APPLY_INGRESS" = "1" ]; then kubectl apply -f k8s/ingress.yaml --validate=false; fi
          kubectl rollout status deployment/frontend -n frontend --timeout=120s
