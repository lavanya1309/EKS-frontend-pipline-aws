name: Deploy to EKS

on:
  workflow_run:
    workflows: ["Test, Build and Push to ECR"]
    types: [completed]
    branches: [main, master]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: frontend-data-validation-tracker

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Bump version from commits (Conventional Commits)
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="1.0.0"
            echo "VERSION_TAG=v${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "Version: v${NEW_VERSION} (initial release)"
            exit 0
          fi
          BASE_VERSION=${LATEST_TAG#v}
          COMMITS=$(git log ${LATEST_TAG}..HEAD --oneline 2>/dev/null || echo "")
          BUMP="patch"
          echo "$COMMITS" | grep -qE "^(feat|fix)(\(.+\))?!|BREAKING CHANGE" && BUMP="major"
          [ "$BUMP" = "patch" ] && echo "$COMMITS" | grep -qE "^feat" && BUMP="minor"
          [ "$BUMP" = "patch" ] && echo "$COMMITS" | grep -qE "^fix" && BUMP="patch"
          IFS='.' read -r MAJ MIN PAT <<< "$BASE_VERSION"
          MAJ=${MAJ:-1}; MIN=${MIN:-0}; PAT=${PAT:-0}
          case $BUMP in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          NEW_VERSION="${MAJ}.${MIN}.${PAT}"
          echo "VERSION_TAG=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Version: v${NEW_VERSION} (bump: $BUMP, base: $BASE_VERSION)"

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          VERSION_TAG: ${{ steps.version.outputs.VERSION_TAG }}
          IMAGE: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.version.outputs.VERSION_TAG }}
          ACM_CERT_ARN: ${{ vars.ACM_CERT_ARN }}
          INGRESS_HOST: ${{ vars.INGRESS_HOST }}
        run: |
          sed -i "s|PLACEHOLDER_ECR_IMAGE|${IMAGE}|g" k8s/deployment.yaml
          if [ -n "$ACM_CERT_ARN" ] && [ -n "$INGRESS_HOST" ]; then
            sed -i "s|REPLACE_WITH_ACM_CERT_ARN|${ACM_CERT_ARN}|g" k8s/ingress.yaml
            sed -i "s|REPLACE_WITH_YOUR_DOMAIN|${INGRESS_HOST}|g" k8s/ingress.yaml
            APPLY_INGRESS=1
          else
            APPLY_INGRESS=0
          fi
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/pdb.yaml
          if [ "$APPLY_INGRESS" = "1" ]; then kubectl apply -f k8s/ingress.yaml; fi
          kubectl rollout status deployment/frontend -n frontend --timeout=120s
